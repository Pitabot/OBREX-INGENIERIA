<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OBREX" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>OBREX INGENIERIA</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0a1628;
      --navy2:  #0f1f3d;
      --gold:   #C8A84B;
      --gold2:  #e8c96a;
      --white:  #f0f4ff;
      --gray:   #8896b3;
      --input-bg: #131f38;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PANTALLAS ── */
    .screen {
      display: none;
      min-height: 100dvh;
      width: 100%;
    }
    .screen.active { display: flex; }

    /* ── INTRO ── */
    #screen-intro {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    #screen-intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, #14264a 0%, var(--navy) 70%);
      opacity: 0;
      animation: introBgFade 1.6s ease forwards;
    }

    @keyframes introBgFade {
      to { opacity: 1; }
    }

    .intro-mark {
      width: 120px;
      height: 120px;
      position: relative;
      margin-bottom: 22px;
      z-index: 1;
      opacity: 0;
      transform: scale(0.5) rotate(-25deg);
      animation: introMarkIn 0.9s cubic-bezier(.2,.9,.25,1.1) forwards 0.25s;
    }

    .intro-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(200,168,75,0.35));
    }

    @keyframes introMarkIn {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .intro-flash {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold2);
      transform: translate(-50%, -50%) scale(0);
      animation: introFlash 0.7s ease forwards 1s;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes introFlash {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
      60%  { transform: translate(-50%, -50%) scale(14); opacity: 0.25; }
      100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
    }

    .intro-wordmark {
      width: 220px;
      max-width: 70vw;
      z-index: 1;
      opacity: 0;
      transform: translateY(14px);
      animation: introFadeUp 0.8s ease forwards 1.05s;
    }

    @keyframes introFadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .intro-skip {
      position: absolute;
      bottom: 36px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #3a4e6e;
      text-transform: uppercase;
      opacity: 0;
      animation: introFadeUp 0.8s ease forwards 2.1s;
      z-index: 1;
    }

    /* ── LOGIN ── */
    #screen-login {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      gap: 0;
      background:
        radial-gradient(ellipse at 50% 0%, #1a2e55 0%, transparent 60%),
        var(--navy);
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 44px;
    }

    .brand-logo {
      width: 230px;
      max-width: 72vw;
      filter: drop-shadow(0 0 22px rgba(200,168,75,0.18));
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--navy2);
      border: 1px solid rgba(200,168,75,0.15);
      border-radius: 18px;
      padding: 32px 28px 28px;
    }

    .login-card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(200,168,75,0.2);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--gold);
    }

    .field input::placeholder { color: #3a4e6e; }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--navy);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-login:active { opacity: 0.85; transform: scale(0.98); }

    /* ── BIENVENIDA ── */
    #screen-welcome {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
      gap: 0;
      background:
        radial-gradient(ellipse at 50% 20%, #1a2e55 0%, transparent 65%),
        var(--navy);
    }

    .welcome-logo {
      width: 92px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 30px rgba(200,168,75,0.3));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(200,168,75,0.22)); }
      50%       { filter: drop-shadow(0 0 32px rgba(200,168,75,0.4)); }
    }

    .welcome-brand {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .welcome-msg {
      font-size: 28px;
      font-weight: 300;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .welcome-msg strong {
      font-weight: 700;
      color: var(--gold);
    }

    .welcome-caption {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.5px;
      margin-bottom: 48px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(200,168,75,0.35);
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-logout:active { background: rgba(200,168,75,0.08); }

    /* ── iOS install banner ── */
    #ios-hint {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--navy2);
      border-top: 1px solid rgba(200,168,75,0.2);
      padding: 14px 20px 28px;
      font-size: 13px;
      color: var(--gray);
      text-align: center;
      line-height: 1.5;
      display: none;
      z-index: 999;
    }
    #ios-hint span { color: var(--gold); font-weight: 600; }
    #ios-hint-close {
      position: absolute;
      top: 10px; right: 16px;
      background: none; border: none;
      color: var(--gray); font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="screen-intro" class="screen active" onclick="skipIntro()">
    <div class="intro-flash"></div>
    <div class="intro-mark">
      <img src="./icon-mark.png" alt="OBREX" />
    </div>
    <img class="intro-wordmark" src="./logo-wordmark.png" alt="OBREX Ingeniería" />
    <div class="intro-skip">Toca para continuar</div>
  </div>

  <!-- LOGIN -->
  <div id="screen-login" class="screen">
    <div class="logo-wrap">
      <img class="brand-logo" src="./logo-wordmark.png" alt="OBREX Ingeniería" />
    </div>

    <div class="login-card">
      <h2>Acceso al sistema</h2>
      <div class="field">
        <label>Usuario</label>
        <input id="inp-user" type="text" placeholder="Ingresa tu usuario" autocomplete="username" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>

  <!-- BIENVENIDA -->
  <div id="screen-welcome" class="screen">
    <img class="welcome-logo" src="./icon-mark.png" alt="OBREX" />
    <div class="welcome-brand">OBREX Ingeniería</div>
    <div class="welcome-msg">Hola, <strong>Oliver</strong> 👋</div>
    <div class="welcome-caption">Bienvenido al sistema</div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>


  <!-- iOS install hint -->
  <div id="ios-hint">
    <button id="ios-hint-close" onclick="document.getElementById('ios-hint').style.display='none'">✕</button>
    Para instalar: toca <span>Compartir ↑</span> y luego<br>
    <span>"Agregar a pantalla de inicio"</span>
  </div>

  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // Mostrar hint en iOS si no está instalada
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;
    if (isIOS && !isStandalone) {
      setTimeout(() => {
        document.getElementById('ios-hint').style.display = 'block';
      }, 2500);
    }

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // Pantalla de intro: pasa sola a login después de la animación
    let introDone = false;
    function skipIntro() {
      if (introDone) return;
      introDone = true;
      show('screen-login');
    }
    setTimeout(skipIntro, 3200);

    function doLogin() {
      const u = document.getElementById('inp-user').value.trim();
      const p = document.getElementById('inp-pass').value.trim();
      if (!u || !p) {
        alert('Por favor ingresa usuario y contraseña.');
        return;
      }
      show('screen-welcome');
    }

    function doLogout() {
      document.getElementById('inp-user').value = '';
      document.getElementById('inp-pass').value = '';
      show('screen-login');
    }

    // Enter key support
    document.getElementById('inp-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
